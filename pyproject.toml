[tool.poetry]
name = "pykli"
version = "0.1.0"
description = ""
authors = ["Ievgenii Shepeliuk <eshepelyuk@gmail.com>"]
readme = "README.md"
packages = [{include = "cli", from = "src"}]

[tool.poetry.dependencies]
python = "^3.11"
click = "^8.1.3"
prompt-toolkit = "^3.0.38"
pygments = "^2.15.1"
xdg-base-dirs = "^6.0.0"
httpx = {extras = ["http2"], version = "^0.24.1"}

[tool.poetry.scripts]
pykli = "cli.__main__:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
line-length = 120
